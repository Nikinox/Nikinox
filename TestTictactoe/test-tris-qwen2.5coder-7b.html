<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 5px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            cursor: pointer;
        }
        .cell:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <div class="board" id="board">
        <!-- Cells will be dynamically added here -->
    </div>

    <script>
        const boardSize = 3;
        let board = Array.from({ length: boardSize }, () => Array(boardSize).fill(null));
        let currentPlayer = 'X';
        let gameOver = false;

        function createBoard() {
            const boardElement = document.getElementById('board');
            for (let i = 0; i < boardSize * boardSize; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.row = Math.floor(i / boardSize);
                cell.dataset.col = i % boardSize;
                cell.addEventListener('click', handleCellClick);
                boardElement.appendChild(cell);
            }
        }

        function handleCellClick(event) {
            const cell = event.target;
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);

            if (board[row][col] || gameOver) return;

            cell.textContent = currentPlayer;
            board[row][col] = currentPlayer;

            if (checkWin(row, col)) {
                alert(`${currentPlayer} wins!`);
                resetBoard();
            } else if (checkDraw()) {
                alert('It\'s a draw!');
                resetBoard();
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function checkWin(row, col) {
            return (
                checkLine(board[row], currentPlayer) ||
                checkLine(getColumn(col), currentPlayer) ||
                (row === col && checkLine(diagonal1(), currentPlayer)) ||
                (row + col === boardSize - 1 && checkLine(diagonal2(), currentPlayer))
            );
        }

        function checkDraw() {
            return board.flat().every(cell => cell !== null);
        }

        function resetBoard() {
            board = Array.from({ length: boardSize }, () => Array(boardSize).fill(null));
            currentPlayer = 'X';
            gameOver = false;
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => (cell.textContent = ''));
        }

        function checkLine(line, player) {
            return line.every(cell => cell === player);
        }

        function getColumn(col) {
            return board.map(row => row[col]);
        }

        function diagonal1() {
            return board.map((row, index) => row[index]);
        }

        function diagonal2() {
            return board.map((row, index) => row[boardSize - 1 - index]);
        }

        createBoard();
    </script>
</body>
</html>
